<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GeoMatching trens</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="controls">
    <div class="controls__header">
      <h2 class="controls__title">GeoMatching</h2>
      <h3 class="controls__subtitle">Trens detectats: <span id="matchedCount">0</span></h3>
    </div>
    <div class="controls__input-group">
      <button class="controls__file-button" data-file="000_100.json">000/100</button>
      <button class="controls__file-button" data-file="200_300.json">200/300</button>
      <button class="controls__file-button" data-file="400_500.json">400/500</button>
      <button class="controls__button" onclick="window.open('https://fgcagents.github.io/proves/', '_blank')">Itineraris ▶</button>
    </div>
    </div>
  </div>

  <div class="color-selector">
    <button class="color-selector-toggle" id="colorSelectorToggle">+</button>
    <div class="color-selector-content" id="colorSelectorContent">
      <div class="color-mode-selector">
        <label for="trainColorSelector">Mode de colors:</label>
        <select id="trainColorSelector">
          <option value="default">Per defecte (segons retard)</option>
          <option value="custom">Colors personalitzats</option>
        </select>
      </div>
        <div id="customColorControls">        <input type="text" id="trainNameInput" placeholder="Nom del tren (ex: 4001)">
        <input type="text" id="colorRefInput" placeholder="Referència (ex: Línia R5)">
        <label for="colorSelect">Color del tren:</label>
        <select id="colorSelect">
          <option value="tooltip-vermell">Vermell</option>
          <option value="tooltip-verd">Verd</option>
          <option value="tooltip-blau">Blau</option>
          <option value="tooltip-groc">Groc</option>
          <option value="tooltip-lila">Lila</option>
        </select>
        <div class="color-actions">
          <button class="assign" onclick="assignTrainColor()">Assignar</button>
          <button class="clear" onclick="clearTrainColors()">Esborrar tots</button>
        </div>
        <div class="color-actions">
          <button class="assign" onclick="exportTrainColors()">Exportar colors</button>
          <button class="assign" onclick="importTrainColors()">Importar colors</button>
        </div>
      </div>
    </div>
  </div>

  <div id="map"></div>
  <div id="itineraryModal">
    <button onclick="document.getElementById('itineraryModal').style.display='none'">Tancar</button>
    <h2>Itinerari <span id="modalTrainName"></span></h2>
    <table id="itineraryTable">
      <thead>
        <tr><th>Estació</th><th>Hora</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
